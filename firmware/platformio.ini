; PlatformIO configuration for Minka-Aire Fan Controller
; ESP32 Lolin D1 Mini + CC1101 + ST7735 LCD

[env:lolin_d32]
platform = espressif32
board = lolin_d32
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    SPI
    Wire
    bodmer/TFT_eSPI@^2.5.43

; TFT_eSPI configuration via build flags (ST7735 128x128)
build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DINITR_GREENTAB3=1
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=128
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=25
    -DTFT_RST=26
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSPI_FREQUENCY=40000000
    -DUSE_DMA_TO_TFT
